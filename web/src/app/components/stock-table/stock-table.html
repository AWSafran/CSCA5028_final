<mat-card>
    <mat-card-header>
        <mat-card-title>{{ title() }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <table mat-table [dataSource]="dataSource()">

            <ng-container matColumnDef="ticker">
                <th mat-header-cell *matHeaderCellDef>Ticker</th>
                <td mat-cell *matCellDef="let stock">{{ stock.T }}</td>
            </ng-container>>

            <ng-container matColumnDef="open">
                <th mat-header-cell *matHeaderCellDef>Open</th>
                <td mat-cell *matCellDef="let stock">{{ stock.o | currency: 'USD'}}</td>
            </ng-container>>

            <ng-container matColumnDef="close">
                <th mat-header-cell *matHeaderCellDef>Close</th>
                <td mat-cell *matCellDef="let stock">{{ stock.c | currency: 'USD' }}</td>
            </ng-container>>

            <ng-container matColumnDef="high">
                <th mat-header-cell *matHeaderCellDef>Daily High</th>
                <td mat-cell *matCellDef="let stock">{{ stock.h | currency: 'USD' }}</td>
            </ng-container>>

            <ng-container matColumnDef="delta">
                <th mat-header-cell *matHeaderCellDef>Day Change</th>
                <td mat-cell *matCellDef="let stock">{{ stock.delta | currency: 'USD' }}</td>
            </ng-container>>

            <ng-container matColumnDef="delta_pct">
                <th mat-header-cell *matHeaderCellDef>Day Change (%)</th>
                <td mat-cell *matCellDef="let stock">{{ stock.delta_pct * 100 | number: '1.0-2' }}%</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="columns"></tr>
            <tr mat-row *matRowDef="let row; columns: columns;" (click)="handleRowClick(row)"></tr>

        </table>
    </mat-card-content>
</mat-card>
