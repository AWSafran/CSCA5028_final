<a [href]="url()" target="_blank">
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ title() }}</mat-card-title>
            <mat-card-subtitle>{{ author() }} - {{ sourceName() }}</mat-card-subtitle>
        </mat-card-header>
        <img mat-card-image [src]="imageUrl()" [alt]="title()" >
        <mat-card-content>{{ description() }}</mat-card-content>
        <mat-card-footer>{{ date() }}</mat-card-footer>
    </mat-card>
</a>
